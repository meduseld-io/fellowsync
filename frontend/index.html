<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>FellowSync</title>
    <link rel="icon" id="favicon" type="image/png" href="/avatars/green.png" />
    <script>
      (function() {
        var fellas = ['green', 'pink', 'yellow', 'purple', 'blue'];
        var saved = localStorage.getItem('fellowsync_avatar');
        var pick = (saved && fellas.indexOf(saved) !== -1) ? saved : 'green';
        var img = new Image();
        img.onload = function() {
          var canvas = document.createElement('canvas');
          canvas.width = 32;
          canvas.height = 32;
          var ctx = canvas.getContext('2d');
          var scale = Math.min(32 / img.width, 32 / img.height);
          var w = img.width * scale;
          var h = img.height * scale;
          ctx.drawImage(img, (32 - w) / 2, (32 - h) / 2, w, h);
          document.getElementById('favicon').href = canvas.toDataURL('image/png');
        };
        img.src = '/avatars/' + pick + '.png';
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
